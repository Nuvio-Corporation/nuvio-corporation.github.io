<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AlJiVi-ID Login</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .login-box .btn {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    width: 100% !important;
    padding: 12px !important;
    margin-top: 15px !important;
    background-color: #4cc9f0 !important;
    border: none !important;
    border-radius: 6px !important;
    cursor: pointer !important;
    font-size: 16px !important;
    font-weight: bold !important;
    color: black !important;
    text-decoration: none !important;
  }

  .login-box .btn img {
    height: 24px !important;
    margin-right: 10px !important;
  }

  .login-box .btn:hover {
    background-color: #3ab0d9 !important;
  }

  .login-box .btn.secondary {
    background-color: #ccc !important;
  }
</style>
</head>

<body>

<div class="login-box">
  <h1>AlJiVi-ID</h1>
  <p class="subtitle">Gateway to AlJiWorld</p>

  <!-- Email / Password Form -->
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>

  <!-- Login Button -->
  <button class="btn" onclick="login()">
    <img src="images/aljivi-template.png" alt="AlJiVi-ID"> Login with AlJiVi-ID
  </button>

  <!-- Create Account Button -->
  <button class="btn secondary" onclick="signup()">
    <img src="images/aljivi-template.png" alt="AlJiVi-ID"> Create Account
  </button>

  <p id="error"></p>
</div>

</body>
</html>
